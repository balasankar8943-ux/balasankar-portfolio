<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#0a0a14"/>
  
  <!-- Triangular outer shape -->
  <path d="M200 40 L320 220 L80 220 Z" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linejoin="round"/>
  
  <!-- Atom orbits -->
  <ellipse cx="200" cy="160" rx="80" ry="30" stroke="#00d4ff" stroke-width="2" fill="none" transform="rotate(-30 200 160)" opacity="0.7"/>
  <ellipse cx="200" cy="160" rx="80" ry="30" stroke="#7b2ff7" stroke-width="2" fill="none" transform="rotate(30 200 160)" opacity="0.7"/>
  <ellipse cx="200" cy="160" rx="80" ry="30" stroke="#00ff88" stroke-width="2" fill="none" transform="rotate(90 200 160)" opacity="0.7"/>
  
  <!-- Center nucleus -->
  <circle cx="200" cy="160" r="8" fill="url(#grad2)"/>
  
  <!-- Circuit lines -->
  <line x1="200" y1="100" x2="200" y2="70" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="65" r="4" fill="#00d4ff" opacity="0.5"/>
  
  <line x1="260" y1="185" x2="285" y2="200" stroke="#7b2ff7" stroke-width="1.5" opacity="0.5"/>
  <circle cx="290" cy="202" r="4" fill="#7b2ff7" opacity="0.5"/>
  
  <line x1="140" y1="185" x2="115" y2="200" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <circle cx="110" cy="202" r="4" fill="#00ff88" opacity="0.5"/>
  
  <!-- Text -->
  <text x="200" y="265" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900" fill="url(#grad1)" letter-spacing="8">YANTRIXA</text>
  
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>
